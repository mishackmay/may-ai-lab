<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>May AI Lab</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">May AI Lab</div>
        <div class="mobile-menu" id="mobileMenu">☰</div>
        <ul class="nav-links" id="navLinks">
            <li><a href="/">Home</a></li>
            <li><a href="/website-gen">Website Generator</a></li>
            <li><a href="/business">Business Dashboard</a></li>
            <li><a href="/troubleshooting">Troubleshooting</a></li>
            <li><a href="/face-auth">Face Login</a></li>
            <li><a href="/pricing">Pricing</a></li>
        </ul>
    </nav>
    <div class="nav-overlay" id="navOverlay"></div>
    
    <main>
        <section class="hero">
            <h1>May AI Lab</h1>
            <p>Advanced AI Solutions Running Locally</p>
        </section>
        
        <div class="modules-grid" id="modules-grid">
            <!-- Modules will be loaded here -->
        </div>
    </main>
    
    <script src="/js/main.js"></script>
    <script>
        const mobileMenu = document.getElementById('mobileMenu');
        const navLinks = document.getElementById('navLinks');
        const navOverlay = document.getElementById('navOverlay');
        
        function toggleMenu() {
            navLinks.classList.toggle('active');
            if (navOverlay) navOverlay.classList.toggle('active');
        }
        
        function closeMenu() {
            navLinks.classList.remove('active');
            if (navOverlay) navOverlay.classList.remove('active');
        }
        
        if (mobileMenu) {
            mobileMenu.addEventListener('click', toggleMenu);
        }
        
        if (navOverlay) {
            navOverlay.addEventListener('click', closeMenu);
        }
        
        if (navLinks) {
            navLinks.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', closeMenu);
            });
        }
    </script>
</body>
</html>
