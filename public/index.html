<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>May AI Lab</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
    <div class="logo">May AI Lab</div>
    <button class="mobile-menu" id="mobileMenu">☰</button>
    <ul class="nav-links" id="navLinks">
        <li><a href="/">Home</a></li>
        <li><a href="/website-gen">Website Generator</a></li>
        <li><a href="/business">Dashboard</a></li>
        <li><a href="/business-setup">Booking Setup</a></li>
        <li><a href="/my-websites">My Websites</a></li>
        <li><a href="/pricing">Pricing</a></li>
        <li><a href="/login">Login</a></li>
    </ul>
</nav>
<div class="nav-overlay" id="navOverlay"></div>
    
    <main>
        <section class="hero">
            <h1>May AI Lab</h1>
            <p>Advanced AI Solutions Running Locally</p>
        </section>
        
        <div class="modules-grid" id="modules-grid">
            <!-- Modules will be loaded here -->
        </div>
    </main>
    
    <script src="/js/main.js"></script>
    <script>
        const mobileMenu = document.getElementById('mobileMenu');
        const navLinks = document.getElementById('navLinks');
        const navOverlay = document.getElementById('navOverlay');
        
        function closeMenu() {
            if (navLinks) navLinks.classList.remove('active');
            if (navOverlay) navOverlay.classList.remove('active');
        }
        
        function toggleMenu(e) {
            if (e) e.stopPropagation();
            if (navLinks) navLinks.classList.toggle('active');
            if (navOverlay) navOverlay.classList.toggle('active');
        }
        
        if (mobileMenu) mobileMenu.addEventListener('click', toggleMenu);
        if (navOverlay) navOverlay.addEventListener('click', closeMenu);
        if (navLinks) {
            navLinks.querySelectorAll('a').forEach(link => link.addEventListener('click', closeMenu));
        }
    </script>
    <script>
    document.getElementById('mobileMenu').addEventListener('click', () => {
        document.getElementById('navLinks').classList.toggle('active');
    });
</script>

<!-- Auth logout script (add this) -->
<script>
    fetch('/api/auth/me')
        .then(r => r.json())
        .then(data => {
            const authLink = document.getElementById('authLink');
            if (data.loggedIn) {
                authLink.innerHTML = '<a href="#" onclick="logout()">Logout</a>';
            } else {
                authLink.innerHTML = '<a href="/login">Login</a>';
            }
        });
    
    function logout() {
        fetch('/api/auth/logout', { method: 'POST' })
            .then(() => window.location.href = '/');
    }
</script>
</body>
</html>
